apiVersion: apps/v1
kind: Deployment
metadata:
  name: tpt-keystone-operator
  namespace: tpt-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tpt-keystone-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tpt-keystone-operator
    spec:
      serviceAccountName: tpt-keystone-operator
      containers:
        - name: tpt-keystone-operator
          image: ghcr.io/example/tpt-keystone-operator:0.1.0 # replace with your built/pushed image
          env:
            - name: RUST_LOG
              value: info
