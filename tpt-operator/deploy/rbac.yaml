apiVersion: v1
kind: ServiceAccount
metadata:
  name: tpt-operator
  namespace: tpt-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tpt-operator
rules:
  - apiGroups: ["tpt.dev"]
    resources: ["keystoneclusters", "keystoneclusters/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tpt-operator
subjects:
  - kind: ServiceAccount
    name: tpt-operator
    namespace: tpt-system
roleRef:
  kind: ClusterRole
  name: tpt-operator
  apiGroup: rbac.authorization.k8s.io
